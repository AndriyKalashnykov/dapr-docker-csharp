name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:

  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          base: ${{ github.event_name == 'push' && 'main' || '' }}
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'e2e/**'
              - 'scripts/**'
              - '**/*.csproj'
              - '**/*.slnx'
              - '**/packages.lock.json'
              - 'global.json'
              - '.mise.toml'
              - 'Makefile'
              - 'docker-compose.yaml'
              - 'compose/**'
              - 'docs/diagrams/**'
              - '.github/workflows/**'
              - 'CLAUDE.md'

  static-check:
    needs: [changes]
    if: needs.changes.outputs.code == 'true' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: Static check
        run: make static-check

  build:
    needs: [changes, static-check]
    # Explicit gate (mirrors static-check). Adding an `if:` strips GitHub's
    # implicit `success()` over `needs`, so the `!failure() && !cancelled()`
    # prefix is REQUIRED to keep blocking on a failed/cancelled upstream
    # (otherwise a failed static-check would leak past `code == 'true'`).
    # A *skipped* static-check (doc-only push) is not a failure, so the
    # code-or-tag predicate then governs and this job skips too.
    if: ${{ !failure() && !cancelled() && (needs.changes.outputs.code == 'true' || startsWith(github.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: Build
        run: make build

  image-build:
    # Build-only validation of the production Dockerfile (no push — there is no
    # publish workflow). Keeps the multi-stage build from rotting unvalidated:
    # a HEALTHCHECK parse error / COPY-path drift / bad base digest would
    # otherwise ship undetected since `make ci` and the other jobs never run
    # `docker build`. setup-dotnet is required only so `make image-build`'s
    # `deps` precondition (`command -v dotnet`) passes; the restore/publish
    # happen inside the image build itself.
    needs: [changes, static-check]
    if: ${{ !failure() && !cancelled() && (needs.changes.outputs.code == 'true' || startsWith(github.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: Image build
        run: make image-build

  test:
    needs: [changes, static-check]
    if: ${{ !failure() && !cancelled() && (needs.changes.outputs.code == 'true' || startsWith(github.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: Test
        run: make test

  integration-test:
    needs: [changes, static-check]
    if: ${{ !failure() && !cancelled() && (needs.changes.outputs.code == 'true' || startsWith(github.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: Integration test
        run: make integration-test

  e2e:
    # `changes` + `static-check` listed as DIRECT needs (alongside build/test)
    # so `!failure()` observes a static-check failure directly rather than
    # relying on transitive `failure()` over the build/test chain (which is
    # documented as unreliable when the failing ancestor is not a direct
    # need — see github/community discussion #80788). A skipped build/test
    # on a doc-only push is not a failure, so the code-or-tag predicate
    # governs and this job skips too.
    needs: [changes, static-check, build, test]
    if: ${{ !failure() && !cancelled() && (needs.changes.outputs.code == 'true' || startsWith(github.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      # e2e runs the full Docker Compose stack (app + daprd + Redis + Jaeger).
      - name: E2E
        run: make e2e

  ci-pass:
    if: always()
    needs: [changes, static-check, build, image-build, test, integration-test, e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more jobs failed"; exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more jobs were cancelled"; exit 1
          fi
          echo "All required jobs passed (or skipped on no-op change)."
