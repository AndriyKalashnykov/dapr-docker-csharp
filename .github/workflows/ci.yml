name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:

  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      code: ${{ steps.filter.outputs.code }}
      diagrams: ${{ steps.filter.outputs.diagrams }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          base: ${{ github.event_name == 'push' && 'main' || '' }}
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'e2e/**'
              - 'scripts/**'
              - '**/*.csproj'
              - '**/*.slnx'
              - '**/packages.lock.json'
              - 'global.json'
              - '.mise.toml'
              - 'Makefile'
              - 'docker-compose.yaml'
              - 'compose/**'
              - '.github/workflows/**'
              - 'CLAUDE.md'
            # docs/diagrams/** is deliberately NOT in `code`: a diagram-only change
            # must run static-check (mermaid-lint + the diagrams-check drift gate)
            # but NOT the heavy build/test/integration-test/e2e/image-build jobs
            # (a .puml/.png change exercises none of them). static-check gates on
            # `code || diagrams`; the heavy jobs stay on `code` only.
            diagrams:
              - 'docs/diagrams/**'
            # README.md carries the inline Mermaid sequence diagram that
            # `make mermaid-lint` (inside static-check) validates, but it is NOT
            # in `code` — so a README-only change would otherwise run NO CI and a
            # broken diagram would merge unlinted. Gate static-check on it too (it
            # runs the composite gate but skips build/test/e2e). CLAUDE.md is
            # already in `code`; README.md is the only other Mermaid-bearing doc.
            docs:
              - 'README.md'

  static-check:
    needs: [changes]
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.diagrams == 'true' || needs.changes.outputs.docs == 'true' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Cache the pinned lint/diagram Docker images (mermaid-cli + plantuml) so
      # static-check (mermaid-lint + diagrams-check) does NOT anonymously pull from
      # Docker Hub on every run — GitHub-hosted runners share egress IPs and can hit
      # Docker Hub's anonymous pull limit (a known CI flake). Keyed on the pinned
      # versions, so a Renovate bump invalidates the cache and re-pulls exactly once.
      - name: Resolve pinned CI image versions
        id: imgver
        run: |
          echo "mermaid=$(sed -n 's/^MERMAID_CLI_VERSION[[:space:]]*:=[[:space:]]*//p' Makefile)" >> "$GITHUB_OUTPUT"
          echo "plantuml=$(sed -n 's/^PLANTUML_VERSION[[:space:]]*:=[[:space:]]*//p' Makefile)" >> "$GITHUB_OUTPUT"

      - name: Restore cached lint/diagram Docker images
        id: img-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/ci-images
          key: ci-images-mermaid-${{ steps.imgver.outputs.mermaid }}-plantuml-${{ steps.imgver.outputs.plantuml }}

      - name: Load cached Docker images
        if: steps.img-cache.outputs.cache-hit == 'true'
        run: for f in /tmp/ci-images/*.tar; do docker load -i "$f"; done

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true

      - name: Static check
        run: make static-check

      # On a cache miss, `make static-check` just pulled the images — export them to
      # the cached path so actions/cache's post-step persists them for the next run.
      - name: Export Docker images for cache
        if: steps.img-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/ci-images
          docker save minlag/mermaid-cli:${{ steps.imgver.outputs.mermaid }} -o /tmp/ci-images/mermaid.tar
          docker save plantuml/plantuml:${{ steps.imgver.outputs.plantuml }} -o /tmp/ci-images/plantuml.tar

  build:
    needs: [changes, static-check]
    # Explicit gate (mirrors static-check). Adding an `if:` strips GitHub's
    # implicit `success()` over `needs`, so the `!failure() && !cancelled()`
    # prefix is REQUIRED to keep blocking on a failed/cancelled upstream
    # (otherwise a failed static-check would leak past `code == 'true'`).
    # A *skipped* static-check (doc-only push) is not a failure, so the
    # code-or-tag predicate then governs and this job skips too.
    if: ${{ !failure() && !cancelled() && (needs.changes.outputs.code == 'true' || startsWith(github.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true

      - name: Build
        run: make build

  image-build:
    # Build-only validation of the production Dockerfile (no push — there is no
    # publish workflow). Keeps the multi-stage build from rotting unvalidated:
    # a HEALTHCHECK parse error / COPY-path drift / bad base digest would
    # otherwise ship undetected since `make ci` and the other jobs never run
    # `docker build`. setup-dotnet is required only so `make image-build`'s
    # `deps` precondition (`command -v dotnet`) passes; the restore/publish
    # happen inside the image build itself.
    needs: [changes, static-check]
    if: ${{ !failure() && !cancelled() && (needs.changes.outputs.code == 'true' || startsWith(github.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true

      - name: Image build
        run: make image-build

  test:
    needs: [changes, static-check]
    if: ${{ !failure() && !cancelled() && (needs.changes.outputs.code == 'true' || startsWith(github.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true

      - name: Test
        run: make test

  integration-test:
    needs: [changes, static-check]
    if: ${{ !failure() && !cancelled() && (needs.changes.outputs.code == 'true' || startsWith(github.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true

      - name: Integration test
        run: make integration-test

  e2e:
    # `changes` + `static-check` listed as DIRECT needs (alongside build/test)
    # so `!failure()` observes a static-check failure directly rather than
    # relying on transitive `failure()` over the build/test chain (which is
    # documented as unreliable when the failing ancestor is not a direct
    # need — see github/community discussion #80788). A skipped build/test
    # on a doc-only push is not a failure, so the code-or-tag predicate
    # governs and this job skips too.
    needs: [changes, static-check, build, test]
    if: ${{ !failure() && !cancelled() && (needs.changes.outputs.code == 'true' || startsWith(github.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true

      # e2e runs the full Docker Compose stack (app + daprd + Redis + Jaeger).
      - name: E2E
        run: make e2e

  ci-pass:
    if: always()
    needs: [changes, static-check, build, image-build, test, integration-test, e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more jobs failed"; exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more jobs were cancelled"; exit 1
          fi
          echo "All required jobs passed (or skipped on no-op change)."
