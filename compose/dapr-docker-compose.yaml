# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
services:
  jaeger:
    image: jaegertracing/jaeger:2.20.0@sha256:46a886260e04002d8f45e213fc39063fa11a50446048fdaa64786fc0840cb9f8
    ports:
      - "${JAEGER_QUERY_HOST_PORT:-16686}:16686"
      - "${JAEGER_OTLP_GRPC_HOST_PORT:-4317}:4317"
      - "${JAEGER_OTLP_HTTP_HOST_PORT:-4318}:4318"
    networks:
      - dapr-demo-network

networks:
  dapr-demo-network:
    name: dapr-demo-network
    external: false
