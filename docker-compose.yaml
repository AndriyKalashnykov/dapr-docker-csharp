# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
#
# All values are env-driven with defaults; the canonical defaults live in
# `.env.example` and a developer override goes in `.env` (gitignored).
services:
  ## QueueProcessor
  queueprocessor:
    image: mcr.microsoft.com/dotnet/sdk:10.0@sha256:548d93f8a18a1acbe6cc127bc4f47281430d34a9e35c18afa80a8d6741c2adc3
    command: ["dotnet", "watch", "run", "--no-hot-reload"]
    working_dir: /app
    volumes:
      - ./src/queue-processor:/app
    environment:
      ASPNETCORE_URLS: "http://*:${APP_INTERNAL_PORT:-5000}"
      ASPNETCORE_ENVIRONMENT: Development
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4317}"
      OTEL_EXPORTER_OTLP_PROTOCOL: "${OTEL_EXPORTER_OTLP_PROTOCOL:-grpc}"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-queueprocessor}"
    ports:
      - "${HOST_PORT:-5000}:${APP_INTERNAL_PORT:-5000}"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://${HEALTHCHECK_HOST:-localhost}:${APP_INTERNAL_PORT:-5000}/healthz || exit 1"]
      interval: ${COMPOSE_HEALTHCHECK_INTERVAL:-10s}
      timeout: ${COMPOSE_HEALTHCHECK_TIMEOUT:-3s}
      retries: ${COMPOSE_HEALTHCHECK_RETRIES:-30}
      start_period: ${COMPOSE_HEALTHCHECK_START_PERIOD:-60s}
    depends_on:
      - redis
    networks:
      - dapr-demo-network
  queueprocessor-dapr:
    image: daprio/daprd:1.18.1@sha256:4434e34fd782db17094123be93a78c0b18556b5b1fca1f06448e54df24e51cdf
    command:
      - "./daprd"
      - "--app-id"
      - "queueprocessor"
      - "--app-port"
      - "${APP_INTERNAL_PORT:-5000}"
      - "--resources-path"
      - "/components"
      - "--config"
      - "/configuration/configuration.yaml"
    volumes:
      - ./compose/configuration/:/configuration
      - ./compose/components/:/components
    network_mode: service:queueprocessor

  redis:
    image: redis:8@sha256:0a972391db0b24ec336e35d1bc98b237237e26f82bf5120cf2f6b1688d1df973
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    networks:
      - dapr-demo-network

networks:
  dapr-demo-network:
